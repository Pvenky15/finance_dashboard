<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceOS — Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#edede9;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.shell{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.logo{font-size:20px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:10px}
.role-badge{font-size:12px;padding:4px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);color:var(--text2);background:var(--bg2)}
select{font-size:13px;padding:5px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer}
.nav{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border);padding-bottom:0}
.nav button{font-size:13px;padding:8px 16px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;border-radius:0;transition:all .15s}
.nav button.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.nav button:hover:not(.active){color:var(--text);background:var(--bg2)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.5rem}
.card{background:var(--bg2);border-radius:var(--radius);padding:1rem}
.card-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.card-value{font-size:22px;font-weight:500}
.card-sub{font-size:11px;margin-top:4px}
.pos{color:#3a9e65}.neg{color:#c94040}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
@media(max-width:620px){.row2{grid-template-columns:1fr}}
.chart-box{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
.chart-title{font-size:13px;font-weight:500;margin-bottom:12px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:8px;font-size:11px;color:var(--text2)}
.legend span{display:flex;align-items:center;gap:4px}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.filters input,.filters select{font-size:12px;padding:5px 9px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text)}
.txn-table{width:100%;border-collapse:collapse;font-size:13px}
.txn-table th{text-align:left;padding:6px 10px;font-size:11px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border)}
.txn-table td{padding:9px 10px;border-bottom:0.5px solid var(--border)}
.txn-table tr:last-child td{border-bottom:none}
.txn-table tr:hover td{background:var(--bg2)}
.badge{font-size:11px;padding:2px 8px;border-radius:999px}
.badge-inc{background:#eaf3de;color:#3b6d11}.badge-exp{background:#fcebeb;color:#a32d2d}
.cat-badge{font-size:11px;padding:2px 7px;border-radius:999px;background:var(--bg2);color:var(--text2)}
.add-btn{font-size:12px;padding:6px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer;margin-bottom:12px}
.add-btn:hover{background:var(--bg2)}
.del-btn{cursor:pointer;color:var(--text2);font-size:11px;margin-left:6px;opacity:.6}
.del-btn:hover{opacity:1;color:#c94040}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:1.5rem;width:340px;max-width:95%}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.form-row input,.form-row select{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text)}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal-btns button{font-size:12px;padding:7px 16px;border-radius:var(--radius);cursor:pointer;border:0.5px solid var(--border2)}
.btn-cancel{background:transparent;color:var(--text2)}
.btn-save{background:var(--text);color:var(--bg);border-color:var(--text)}
.insights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:1.5rem}
.insight-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
.insight-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.insight-value{font-size:18px;font-weight:500}
.insight-note{font-size:11px;color:var(--text2);margin-top:4px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.bar-label{width:90px;color:var(--text2);flex-shrink:0;text-align:right}
.bar-track{flex:1;background:var(--bg2);border-radius:4px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-amt{width:70px;color:var(--text);text-align:right;flex-shrink:0}
.page{display:none}.page.active{display:block}
.empty{font-size:13px;color:var(--text2);padding:2rem;text-align:center}
.section-title{font-size:14px;font-weight:500;margin-bottom:12px}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="logo">FinanceOS</div>
    <div class="topbar-right">
      <span class="role-badge" id="role-label">Viewing as Admin</span>
      <select id="role-sel" onchange="switchRole(this.value)">
        <option value="admin">Admin</option>
        <option value="viewer">Viewer</option>
      </select>
    </div>
  </div>

  <div class="nav">
    <button class="active" onclick="showPage('overview',this)">Overview</button>
    <button onclick="showPage('transactions',this)">Transactions</button>
    <button onclick="showPage('insights',this)">Insights</button>
  </div>

  <!-- OVERVIEW -->
  <div class="page active" id="page-overview">
    <div class="cards" id="summary-cards"></div>
    <div class="row2">
      <div class="chart-box">
        <div class="chart-title">Balance trend</div>
        <div style="position:relative;height:200px"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">Spending by category</div>
        <div id="donut-legend" class="legend"></div>
        <div style="position:relative;height:170px"><canvas id="donutChart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div class="page" id="page-transactions">
    <div id="admin-add-wrap">
      <button class="add-btn" onclick="openModal()">+ Add transaction</button>
    </div>
    <div class="filters">
      <input type="text" id="search-inp" placeholder="Search..." oninput="renderTxns()" style="width:160px">
      <select id="filter-type" onchange="renderTxns()">
        <option value="">All types</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <select id="filter-cat" onchange="renderTxns()"><option value="">All categories</option></select>
      <select id="sort-sel" onchange="renderTxns()">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="amt-desc">Highest amount</option>
        <option value="amt-asc">Lowest amount</option>
      </select>
    </div>
    <div style="overflow-x:auto">
      <table class="txn-table">
        <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th style="text-align:right">Amount</th></tr></thead>
        <tbody id="txn-body"></tbody>
      </table>
    </div>
    <div id="txn-empty" class="empty" style="display:none">No transactions found.</div>
  </div>

  <!-- INSIGHTS -->
  <div class="page" id="page-insights">
    <div class="insights-grid" id="insights-grid"></div>
    <div style="margin-bottom:1.5rem">
      <div class="section-title">Spending breakdown</div>
      <div id="spend-bars"></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Monthly income vs expenses</div>
      <div class="legend" id="monthly-legend">
        <span><span class="legend-dot" style="background:rgba(58,158,101,.75)"></span>Income</span>
        <span><span class="legend-dot" style="background:rgba(201,64,64,.65)"></span>Expenses</span>
      </div>
      <div style="position:relative;height:220px"><canvas id="monthlyChart"></canvas></div>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Add transaction</h3>
    <div class="form-row"><label>Description</label><input id="f-desc" type="text" placeholder="e.g. Grocery run"></div>
    <div class="form-row"><label>Amount (₹)</label><input id="f-amt" type="number" min="1" placeholder="0"></div>
    <div class="form-row"><label>Type</label>
      <select id="f-type"><option value="income">Income</option><option value="expense" selected>Expense</option></select>
    </div>
    <div class="form-row"><label>Category</label>
      <select id="f-cat">
        <option>Food</option><option>Shopping</option><option>Transport</option><option>Bills</option>
        <option>Healthcare</option><option>Entertainment</option><option>Salary</option><option>Other</option>
      </select>
    </div>
    <div class="form-row"><label>Date</label><input id="f-date" type="date"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTransaction()">Save</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let role = 'admin';
let transactions = [
  {id:1,date:'2026-03-01',desc:'Salary',cat:'Salary',type:'income',amt:85000},
  {id:2,date:'2026-03-03',desc:'Rent',cat:'Bills',type:'expense',amt:18000},
  {id:3,date:'2026-03-05',desc:'BigBasket',cat:'Food',type:'expense',amt:3200},
  {id:4,date:'2026-03-08',desc:'Uber ride',cat:'Transport',type:'expense',amt:450},
  {id:5,date:'2026-03-10',desc:'Netflix',cat:'Entertainment',type:'expense',amt:649},
  {id:6,date:'2026-03-12',desc:'Apollo pharmacy',cat:'Healthcare',type:'expense',amt:1100},
  {id:7,date:'2026-03-15',desc:'Freelance project',cat:'Other',type:'income',amt:12000},
  {id:8,date:'2026-03-18',desc:'Myntra order',cat:'Shopping',type:'expense',amt:2800},
  {id:9,date:'2026-03-20',desc:'Electricity bill',cat:'Bills',type:'expense',amt:1800},
  {id:10,date:'2026-03-22',desc:'Zomato',cat:'Food',type:'expense',amt:920},
  {id:11,date:'2026-04-01',desc:'Salary',cat:'Salary',type:'income',amt:85000},
  {id:12,date:'2026-04-02',desc:'Rent',cat:'Bills',type:'expense',amt:18000},
  {id:13,date:'2026-04-02',desc:'Swiggy',cat:'Food',type:'expense',amt:680},
  {id:14,date:'2026-04-03',desc:'Metro card recharge',cat:'Transport',type:'expense',amt:500},
  {id:15,date:'2026-04-03',desc:'Crossword Books',cat:'Shopping',type:'expense',amt:1250},
];
let nextId = 16;

const catColors = {Salary:'#3a9e65',Food:'#378ADD',Shopping:'#d85a30',Transport:'#ba7517',Bills:'#533AB7',Healthcare:'#d4537e',Entertainment:'#1d9e75',Other:'#888780'};
let trendInst, donutInst, monthlyInst;

const fmt = n => '₹' + Math.abs(n).toLocaleString('en-IN');

function switchRole(r) {
  role = r;
  document.getElementById('role-label').textContent = 'Viewing as ' + (r === 'admin' ? 'Admin' : 'Viewer');
  document.getElementById('admin-add-wrap').style.display = r === 'admin' ? '' : 'none';
  renderTxns();
}

function showPage(p, btn) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  btn.classList.add('active');
  if (p === 'overview') initCharts();
  if (p === 'insights') renderInsights();
}

function computeSummary() {
  let income = 0, expense = 0;
  transactions.forEach(t => t.type === 'income' ? income += t.amt : expense += t.amt);
  return { income, expense, balance: income - expense };
}

function renderCards() {
  const s = computeSummary();
  document.getElementById('summary-cards').innerHTML = `
    <div class="card"><div class="card-label">Net balance</div><div class="card-value">${fmt(s.balance)}</div><div class="card-sub ${s.balance >= 0 ? 'pos' : 'neg'}">${s.balance >= 0 ? 'Surplus' : 'Deficit'}</div></div>
    <div class="card"><div class="card-label">Total income</div><div class="card-value">${fmt(s.income)}</div><div class="card-sub pos">+${transactions.filter(t => t.type === 'income').length} entries</div></div>
    <div class="card"><div class="card-label">Total expenses</div><div class="card-value">${fmt(s.expense)}</div><div class="card-sub neg">${transactions.filter(t => t.type === 'expense').length} transactions</div></div>
    <div class="card"><div class="card-label">Savings rate</div><div class="card-value">${s.income > 0 ? Math.round((s.balance / s.income) * 100) : 0}%</div><div class="card-sub">of income saved</div></div>
  `;
}

function initCharts() {
  renderCards();
  const months = ['Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr'];
  const balances = [42000, 51000, 38000, 55000, 67000, 78000, computeSummary().balance];

  if (trendInst) trendInst.destroy();
  trendInst = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: { labels: months, datasets: [{ label: 'Balance', data: balances, borderColor: '#378ADD', backgroundColor: 'rgba(55,138,221,0.08)', tension: 0.4, pointRadius: 3, pointBackgroundColor: '#378ADD', fill: true }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(128,128,128,.1)' }, ticks: { font: { size: 10 } } }, y: { grid: { color: 'rgba(128,128,128,.1)' }, ticks: { font: { size: 10 }, callback: v => '₹' + Math.round(v / 1000) + 'k' } } } }
  });

  const catTotals = {};
  transactions.filter(t => t.type === 'expense').forEach(t => { catTotals[t.cat] = (catTotals[t.cat] || 0) + t.amt });
  const cats = Object.keys(catTotals), vals = cats.map(c => catTotals[c]), colors = cats.map(c => catColors[c] || '#888');
  const total = vals.reduce((a, b) => a + b, 0);

  document.getElementById('donut-legend').innerHTML = cats.map((c, i) => `<span><span class="legend-dot" style="background:${colors[i]}"></span>${c} ${Math.round(vals[i] / total * 100)}%</span>`).join('');
  if (donutInst) donutInst.destroy();
  donutInst = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: { labels: cats, datasets: [{ data: vals, backgroundColor: colors, borderWidth: 1.5, borderColor: '#fff' }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + fmt(ctx.raw) } } } }
  });
}

function renderTxns() {
  const search = document.getElementById('search-inp').value.toLowerCase();
  const type = document.getElementById('filter-type').value;
  const cat = document.getElementById('filter-cat').value;
  const sort = document.getElementById('sort-sel').value;
  let data = [...transactions];
  if (search) data = data.filter(t => t.desc.toLowerCase().includes(search) || t.cat.toLowerCase().includes(search));
  if (type) data = data.filter(t => t.type === type);
  if (cat) data = data.filter(t => t.cat === cat);
  if (sort === 'date-desc') data.sort((a, b) => b.date.localeCompare(a.date));
  else if (sort === 'date-asc') data.sort((a, b) => a.date.localeCompare(b.date));
  else if (sort === 'amt-desc') data.sort((a, b) => b.amt - a.amt);
  else data.sort((a, b) => a.amt - b.amt);

  const tbody = document.getElementById('txn-body');
  const empty = document.getElementById('txn-empty');
  if (!data.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = data.map(t => `
    <tr>
      <td style="color:var(--text2)">${t.date}</td>
      <td>${t.desc}${role === 'admin' ? `<span class="del-btn" onclick="delTxn(${t.id})">✕</span>` : ''}</td>
      <td><span class="cat-badge">${t.cat}</span></td>
      <td><span class="badge ${t.type === 'income' ? 'badge-inc' : 'badge-exp'}">${t.type}</span></td>
      <td style="text-align:right;font-weight:500;color:${t.type === 'income' ? '#3a9e65' : '#c94040'}">${t.type === 'income' ? '+' : '-'}${fmt(t.amt)}</td>
    </tr>`).join('');
}

function buildCatFilter() {
  const cats = [...new Set(transactions.map(t => t.cat))].sort();
  document.getElementById('filter-cat').innerHTML = '<option value="">All categories</option>' + cats.map(c => `<option>${c}</option>`).join('');
}

function openModal() {
  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('f-desc').value = '';
  document.getElementById('f-amt').value = '';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function saveTransaction() {
  const desc = document.getElementById('f-desc').value.trim();
  const amt = parseFloat(document.getElementById('f-amt').value);
  const type = document.getElementById('f-type').value;
  const cat = document.getElementById('f-cat').value;
  const date = document.getElementById('f-date').value;
  if (!desc || !amt || !date) { alert('Please fill all fields'); return; }
  transactions.push({ id: nextId++, date, desc, cat, type, amt });
  closeModal(); buildCatFilter(); renderTxns(); renderCards();
}

function delTxn(id) {
  transactions = transactions.filter(t => t.id !== id);
  renderTxns(); renderCards(); buildCatFilter();
}

function renderInsights() {
  const expenses = transactions.filter(t => t.type === 'expense');
  const catTotals = {};
  expenses.forEach(t => { catTotals[t.cat] = (catTotals[t.cat] || 0) + t.amt });
  const topCat = Object.entries(catTotals).sort((a, b) => b[1] - a[1])[0];
  const avgTxn = expenses.length ? Math.round(expenses.reduce((a, t) => a + t.amt, 0) / expenses.length) : 0;
  const mar = { income: 0, expense: 0 }, apr = { income: 0, expense: 0 };
  transactions.forEach(t => {
    if (t.date.startsWith('2026-03')) mar[t.type] += t.amt;
    if (t.date.startsWith('2026-04')) apr[t.type] += t.amt;
  });

  document.getElementById('insights-grid').innerHTML = `
    <div class="insight-card"><div class="insight-label">Top spending category</div><div class="insight-value">${topCat ? topCat[0] : '—'}</div><div class="insight-note">${topCat ? fmt(topCat[1]) + ' total' : ''}</div></div>
    <div class="insight-card"><div class="insight-label">Avg expense size</div><div class="insight-value">${fmt(avgTxn)}</div><div class="insight-note">across ${expenses.length} transactions</div></div>
    <div class="insight-card"><div class="insight-label">March net savings</div><div class="insight-value ${mar.income - mar.expense >= 0 ? 'pos' : 'neg'}">${fmt(mar.income - mar.expense)}</div><div class="insight-note">${Math.round((mar.income - mar.expense) / mar.income * 100)}% savings rate</div></div>
    <div class="insight-card"><div class="insight-label">Apr savings so far</div><div class="insight-value ${apr.income - apr.expense >= 0 ? 'pos' : 'neg'}">${fmt(apr.income - apr.expense)}</div><div class="insight-note">Month in progress</div></div>
  `;

  const sorted = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
  const maxAmt = sorted[0] ? sorted[0][1] : 1;
  document.getElementById('spend-bars').innerHTML = sorted.map(([cat, amt]) => `
    <div class="bar-row">
      <div class="bar-label">${cat}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt / maxAmt * 100)}%;background:${catColors[cat] || '#888'}"></div></div>
      <div class="bar-amt">${fmt(amt)}</div>
    </div>`).join('');

  if (monthlyInst) monthlyInst.destroy();
  monthlyInst = new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: {
      labels: ['Mar 2026', 'Apr 2026'],
      datasets: [
        { label: 'Income', data: [mar.income, apr.income], backgroundColor: 'rgba(58,158,101,.75)', borderRadius: 4 },
        { label: 'Expenses', data: [mar.expense, apr.expense], backgroundColor: 'rgba(201,64,64,.65)', borderRadius: 4 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { ticks: { callback: v => '₹' + Math.round(v / 1000) + 'k' }, grid: { color: 'rgba(128,128,128,.1)' } } } }
  });
}

buildCatFilter();
renderCards();
initCharts();
renderTxns();
</script>
</body>
</html>
